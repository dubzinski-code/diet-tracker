<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב תזונה יומי</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap');
  :root {
    --bg:#f5f2ed; --card:#fff; --accent:#2d6a4f; --accent2:#40916c; --accent3:#74c69d;
    --warn:#e07a5f; --warn-light:#fff0ec; --ok:#2d6a4f; --ok-light:#edf7f2;
    --neutral:#f0ebe3; --text:#1a1a1a; --text-muted:#6b6b6b; --border:#e0d9cf;
    --shadow:0 2px 12px rgba(0,0,0,0.08);
    --carb:#5b7fc4; --prot:#c9883a; --fat:#e07a5f; --veg:#2d6a4f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}

  .header{background:var(--accent);color:white;padding:13px 15px 11px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(45,106,79,0.3);}
  .header-title{font-size:1.1rem;font-weight:800;}
  .header-date{font-size:0.72rem;opacity:0.85;margin-top:1px;}
  .nav-btn{background:rgba(255,255,255,0.18);border:none;color:white;border-radius:7px;padding:5px 10px;font-family:'Heebo',sans-serif;font-size:0.75rem;cursor:pointer;transition:background 0.2s;}
  .nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,0.35);}

  .main{max-width:600px;margin:0 auto;padding:13px 12px 88px;}

  .bank-card{background:var(--card);border-radius:14px;padding:13px;margin-bottom:11px;box-shadow:var(--shadow);}
  .bank-title{font-size:0.68rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:9px;}
  .bank-items{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .bank-item{background:var(--neutral);border-radius:9px;padding:8px 5px;text-align:center;transition:background 0.3s;}
  .bank-item.warn{background:var(--warn-light);}
  .bank-item.ok-state{background:var(--ok-light);}
  .bank-label{font-size:0.6rem;color:var(--text-muted);margin-bottom:3px;}
  .bank-value{font-size:1.15rem;font-weight:800;line-height:1;}
  .bank-value.warn{color:var(--warn);}
  .bank-value.ok-state{color:var(--ok);}
  .bank-fraction{font-size:0.58rem;color:var(--text-muted);margin-top:2px;}

  .alert{border-radius:9px;padding:8px 11px;margin-bottom:7px;font-size:0.78rem;display:flex;align-items:flex-start;gap:6px;}
  .alert.warn{background:var(--warn-light);color:#c0392b;}
  .alert.good{background:var(--ok-light);color:#1b5e3b;}
  .alert.info{background:#e8f4fd;color:#1a6fa3;}

  .section-title{font-size:0.68rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin:15px 0 7px;}

  .meal-card{background:var(--card);border-radius:13px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow);}
  .meal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
  .meal-name{font-weight:700;font-size:0.88rem;}
  .meal-right{display:flex;align-items:center;gap:5px;}
  .time-badge{font-size:0.68rem;color:var(--text-muted);background:var(--neutral);border-radius:7px;padding:2px 7px;}
  .time-badge.late{background:var(--warn-light);color:var(--warn);}

  .meal-time-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .meal-time-label{font-size:0.7rem;color:var(--text-muted);font-weight:600;}
  input[type="time"]{border:1.5px solid var(--border);border-radius:7px;padding:5px 7px;font-family:'Heebo',sans-serif;font-size:0.78rem;background:var(--bg);color:var(--text);width:86px;direction:ltr;}
  input[type="time"]:focus{outline:none;border-color:var(--accent3);}

  .macro-block{border-radius:9px;padding:8px 10px;margin-bottom:5px;}
  .macro-block.c-carb{background:#eef2fa;}
  .macro-block.c-prot{background:#fdf6ea;}
  .macro-block.c-fat{background:#fef0ec;}
  .macro-block.c-veg{background:#edf7f2;}

  .macro-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .macro-name{font-size:0.7rem;font-weight:700;display:flex;align-items:center;gap:4px;}
  .mdot{width:6px;height:6px;border-radius:50%;display:inline-block;}
  .macro-count{font-size:0.75rem;font-weight:700;}

  .chips{display:flex;flex-wrap:wrap;gap:4px;}
  .chip{font-size:0.66rem;padding:3px 8px;border-radius:18px;border:1.5px solid var(--border);background:white;cursor:pointer;color:var(--text-muted);transition:all 0.13s;user-select:none;line-height:1.3;}
  .chip:hover{border-color:#999;color:var(--text);}
  .chip.sc{background:var(--carb);color:white;border-color:var(--carb);}
  .chip.sp{background:var(--prot);color:white;border-color:var(--prot);}
  .chip.sf{background:var(--fat);color:white;border-color:var(--fat);}
  .chip.sv{background:var(--veg);color:white;border-color:var(--veg);}

  .veg-bar{background:rgba(45,106,79,0.13);border-radius:20px;height:5px;overflow:hidden;margin-top:5px;}
  .veg-fill{height:100%;background:var(--veg);border-radius:20px;transition:width 0.4s ease;}

  .note-input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;font-family:'Heebo',sans-serif;font-size:0.76rem;background:var(--bg);color:var(--text);direction:rtl;margin-top:6px;}
  .note-input:focus{outline:none;border-color:var(--accent3);background:white;}
  .note-input::placeholder{color:#bbb;}

  .manual-row{display:flex;align-items:center;gap:7px;margin-top:7px;padding-top:6px;border-top:1px dashed rgba(0,0,0,0.08);}
  .manual-lbl{font-size:0.65rem;color:var(--text-muted);white-space:nowrap;font-weight:600;}
  .manual-inp{width:64px;border:1.5px solid var(--border);border-radius:7px;padding:4px 7px;font-family:'Heebo',sans-serif;font-size:0.8rem;background:white;color:var(--text);text-align:center;direction:ltr;}
  .manual-inp:focus{outline:none;border-color:var(--accent3);}
  .manual-inp::placeholder{color:#ccc;font-size:0.7rem;}
  .manual-desc{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:4px 9px;font-family:'Heebo',sans-serif;font-size:0.73rem;background:white;color:var(--text);direction:rtl;}
  .manual-desc:focus{outline:none;border-color:var(--accent3);}
  .manual-desc::placeholder{color:#ccc;}

  .feedback-card{background:var(--card);border-radius:13px;padding:13px;margin-bottom:10px;box-shadow:var(--shadow);}
  .feedback-title{font-weight:700;font-size:0.86rem;margin-bottom:9px;}
  .feedback-text{font-size:0.76rem;line-height:1.65;white-space:pre-wrap;}
  .copy-btn{margin-top:9px;background:var(--accent);color:white;border:none;border-radius:9px;padding:7px 16px;font-family:'Heebo',sans-serif;font-size:0.78rem;cursor:pointer;transition:background 0.2s;}
  .copy-btn:hover{background:var(--accent2);}

  .wakeup-card{background:var(--card);border-radius:11px;padding:9px 13px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:9px;}
  .wakeup-label{font-size:0.8rem;font-weight:600;flex:1;}

  .history-item{background:var(--card);border-radius:13px;padding:11px;margin-bottom:9px;box-shadow:var(--shadow);}
  .history-date{font-weight:700;font-size:0.86rem;margin-bottom:6px;}
  .history-row{display:flex;justify-content:space-between;font-size:0.76rem;color:var(--text-muted);padding:2px 0;}
  .history-value{font-weight:600;color:var(--text);}
  .dok{color:var(--ok);} .dwarn{color:var(--warn);}

  .settings-card{background:var(--card);border-radius:13px;padding:13px;margin-bottom:11px;box-shadow:var(--shadow);}
  .settings-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem;}
  .settings-row:last-child{border-bottom:none;}
  .sval{font-size:0.76rem;color:var(--text-muted);background:var(--neutral);padding:2px 8px;border-radius:6px;}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:7px 0 13px;z-index:100;}
  .bottom-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:'Heebo',sans-serif;font-size:0.62rem;transition:color 0.2s;padding:2px 10px;}
  .bottom-btn .icon{font-size:1.2rem;}
  .bottom-btn.active{color:var(--accent);}

  .view{display:none;} .view.active{display:block;}
  @keyframes pg{0%{box-shadow:0 0 0 0 rgba(45,106,79,0.4)}70%{box-shadow:0 0 0 8px rgba(45,106,79,0)}100%{box-shadow:0 0 0 0 rgba(45,106,79,0)}}
  .pulse{animation:pg 0.6s ease;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🥗 עוגן תזונה</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div style="display:flex;gap:4px;">
    <button class="nav-btn active" id="navToday" onclick="showView('today')">היום</button>
    <button class="nav-btn" id="navHistory" onclick="showView('history')">היסטוריה</button>
    <button class="nav-btn" id="navSettings" onclick="showView('settings')">הגדרות</button>
  </div>
</div>

<div class="main">

  <div class="view active" id="viewToday">

    <div class="wakeup-card">
      <span class="wakeup-label">⏰ שעת השכמה</span>
      <input type="time" id="wakeupTime" value="07:00" onchange="updateTimings()">
    </div>

    <div id="alertsZone"></div>

    <div class="bank-card">
      <div class="bank-title">בנק יומי</div>
      <div class="bank-items">
        <div class="bank-item" id="bkC"><div class="bank-label">פחמימות</div><div class="bank-value" id="bvC" style="color:var(--carb)">0</div><div class="bank-fraction">מתוך 5–6</div></div>
        <div class="bank-item" id="bkP"><div class="bank-label">חלבונים</div><div class="bank-value" id="bvP" style="color:var(--prot)">0</div><div class="bank-fraction">מתוך 3.5</div></div>
        <div class="bank-item" id="bkF"><div class="bank-label">שומנים</div><div class="bank-value" id="bvF" style="color:var(--fat)">0</div><div class="bank-fraction">מתוך 2</div></div>
        <div class="bank-item" id="bkV"><div class="bank-label">ירקות</div><div class="bank-value" id="bvV" style="color:var(--veg)">0</div><div class="bank-fraction">מתוך 700ג</div></div>
      </div>
    </div>

    <div class="section-title">ארוחות</div>
    <div id="mealsContainer"></div>

    <div class="feedback-card">
      <div class="feedback-title">📋 דיווח לוואטסאפ</div>
      <div class="feedback-text" id="feedbackText" style="color:var(--text-muted);font-style:italic;">מלאי ארוחות כדי לקבל דיווח...</div>
      <button class="copy-btn" id="copyBtn" onclick="copyReport()" style="display:none;">📋 העתק לוואטסאפ</button>
    </div>

  </div>

  <div class="view" id="viewHistory">
    <div class="section-title" style="margin-top:6px;">היסטוריה</div>
    <div id="historyList"></div>
  </div>

  <div class="view" id="viewSettings">
    <div class="section-title" style="margin-top:6px;">הגדרות התוכנית</div>
    <div class="settings-card">
      <div class="settings-row"><span>פחמימות ביום</span><span class="sval">5–6 מנות</span></div>
      <div class="settings-row"><span>חלבון ביום</span><span class="sval">3.5 מנות</span></div>
      <div class="settings-row"><span>שומן ביום</span><span class="sval">2 מנות</span></div>
      <div class="settings-row"><span>ירקות ביום</span><span class="sval">700 גרם</span></div>
      <div class="settings-row"><span>מרווח בין ארוחות</span><span class="sval">עד 4 שעות</span></div>
    </div>
    <div class="settings-card">
      <div style="font-size:0.83rem;font-weight:700;margin-bottom:9px;">פעולות</div>
      <button onclick="clearToday()" style="width:100%;padding:9px;background:var(--warn-light);color:var(--warn);border:none;border-radius:9px;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;margin-bottom:7px;">🗑️ נקה דיווח היום</button>
      <button onclick="saveToHistory()" style="width:100%;padding:9px;background:var(--ok-light);color:var(--ok);border:none;border-radius:9px;font-family:'Heebo',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;">💾 שמור להיסטוריה</button>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <button class="bottom-btn active" id="btnToday" onclick="showView('today')"><span class="icon">📅</span>היום</button>
  <button class="bottom-btn" id="btnHistory" onclick="showView('history')"><span class="icon">📊</span>היסטוריה</button>
  <button class="bottom-btn" id="btnSettings" onclick="showView('settings')"><span class="icon">⚙️</span>הגדרות</button>
</div>

<script>
// ── FOOD DB ──────────────────────────────────────────────────────────
const FOODS = {
  carb: [
    {n:'2 פרוסות לחם קל', p:1},
    {n:'פיתה כוסמין קלה', p:1},
    {n:'תפוח 160ג', p:1},
    {n:'תות 250ג', p:1},
    {n:'בננה 80ג', p:1},
    {n:'קיווי 130ג', p:1},
    {n:'אוכמניות 120ג', p:1},
    {n:'אפרסמון 100ג', p:1},
    {n:'אפרסק 200ג', p:1},
    {n:'אורז 160ג מבושל', p:1},
    {n:'תפ"א 200ג', p:1},
    {n:'בטטה 180ג', p:1},
    {n:'פסטה 160ג מבושלת', p:1},
    {n:'פתיתים 160ג מבושל', p:1},
    {n:'קינואה 160ג מבושלת', p:1},
  ],
  prot: [
    {n:'חזה עוף 150ג', p:1},
    {n:'פרגית 150ג', p:1},
    {n:'בשר בקר 200ג', p:1},
    {n:'דג לבן 200ג', p:1},
    {n:'סלמון 100ג', p:1},
    {n:'טונה במים (קופסה)', p:1},
    {n:'קוטג׳ 100ג', p:1},
    {n:'גבינה לבנה 5% 100ג', p:1},
    {n:'גבינה צהובה 9% 25ג', p:1},
    {n:'יוגורט ביו פרו 0% 200ג', p:1},
    {n:'טופו 100ג ⚠️+שומן', p:1, xfat:1},
  ],
  fat: [
    {n:'טחינה גולמית כפית', p:1},
    {n:'טחינה מוכנה כף', p:1},
    {n:'שמן זית כפית', p:1},
    {n:'שמן קוקוס כפית', p:1},
    {n:'אבוקדו 35ג', p:1},
    {n:'אגוזים/שקדים 7ג', p:1},
    {n:'חמאת בוטנים כפית', p:1},
  ],
  veg: [
    {n:'ירקות חיים', g:200},
    {n:'ירקות מבושלים', g:200},
  ]
};

// ── STATE ────────────────────────────────────────────────────────────
const S = { wakeup:'07:00', meals:{} };
for (let i=1;i<=5;i++) S.meals[i]={time:'',carb:0,prot:0,fat:0,veg:0,note:'',sc:null,sp:[],sf:[],sv:[],mCarb:0,mProt:0,mFat:0,mVeg:0,carbDesc:'',protDesc:'',fatDesc:'',vegDesc:''};

// ── BUILD ────────────────────────────────────────────────────────────
function buildMeals() {
  const c = document.getElementById('mealsContainer');
  for (let i=1;i<=5;i++) c.innerHTML += mealHTML(i);
}

function chips(type, meal, arr) {
  return arr.map(f => {
    const extra = type==='veg' ? `data-g="${f.g}"` : `data-p="${f.p}"${f.xfat?` data-xfat="1"`:``}`;
    return `<span class="chip" data-meal="${meal}" data-type="${type}" data-name="${f.n}" ${extra} onclick="tap(this)">${f.n}</span>`;
  }).join('');
}

function mealHTML(i) {
  return `<div class="meal-card" id="mc${i}">
    <div class="meal-header">
      <div class="meal-name">ארוחה ${i}</div>
      <div class="meal-right">
        <span class="time-badge" id="tb${i}">—</span>
        <span id="ms${i}">⬜</span>
      </div>
    </div>
    <div class="meal-time-row">
      <span class="meal-time-label">⏰ שעה:</span>
      <input type="time" class="meal-time" data-meal="${i}" onchange="updateTimings()">
    </div>
    <div class="macro-block c-carb">
      <div class="macro-top">
        <div class="macro-name"><span class="mdot" style="background:var(--carb)"></span>פחמימות</div>
        <span class="macro-count" id="mc-c${i}" style="color:var(--carb)">0 מנות</span>
      </div>
      <div class="chips">${chips('carb',i,FOODS.carb)}</div>
      <div class="manual-row">
        <span class="manual-lbl">➕ ידני:</span>
        <input type="number" class="manual-inp" min="0" max="10" step="0.5" placeholder="0" data-meal="${i}" data-mtype="carb" oninput="manualInput(this)">
        <span class="manual-lbl">מנות</span>
        <input type="text" class="manual-desc" placeholder="מה אכלת?" data-meal="${i}" data-mtype="carb-desc" oninput="S.meals[${i}].carbDesc=this.value;saveToStorage();">
      </div>
    </div>
    <div class="macro-block c-prot">
      <div class="macro-top">
        <div class="macro-name"><span class="mdot" style="background:var(--prot)"></span>חלבון</div>
        <span class="macro-count" id="mc-p${i}" style="color:var(--prot)">0 מנות</span>
      </div>
      <div class="chips">${chips('prot',i,FOODS.prot)}</div>
      <div class="manual-row">
        <span class="manual-lbl">➕ ידני:</span>
        <input type="number" class="manual-inp" min="0" max="10" step="0.5" placeholder="0" data-meal="${i}" data-mtype="prot" oninput="manualInput(this)">
        <span class="manual-lbl">מנות</span>
        <input type="text" class="manual-desc" placeholder="מה אכלת?" data-meal="${i}" data-mtype="prot-desc" oninput="S.meals[${i}].protDesc=this.value;saveToStorage();">
      </div>
    </div>
    <div class="macro-block c-fat">
      <div class="macro-top">
        <div class="macro-name"><span class="mdot" style="background:var(--fat)"></span>שומן</div>
        <span class="macro-count" id="mc-f${i}" style="color:var(--fat)">0 מנות</span>
      </div>
      <div class="chips">${chips('fat',i,FOODS.fat)}</div>
      <div class="manual-row">
        <span class="manual-lbl">➕ ידני:</span>
        <input type="number" class="manual-inp" min="0" max="10" step="0.5" placeholder="0" data-meal="${i}" data-mtype="fat" oninput="manualInput(this)">
        <span class="manual-lbl">מנות</span>
        <input type="text" class="manual-desc" placeholder="מה אכלת?" data-meal="${i}" data-mtype="fat-desc" oninput="S.meals[${i}].fatDesc=this.value;saveToStorage();">
      </div>
    </div>
    <div class="macro-block c-veg">
      <div class="macro-top">
        <div class="macro-name"><span class="mdot" style="background:var(--veg)"></span>ירקות</div>
        <span class="macro-count" id="mc-v${i}" style="color:var(--veg)">0 גרם</span>
      </div>
      <div class="chips">${chips('veg',i,FOODS.veg)}</div>
      <div class="veg-bar"><div class="veg-fill" id="vf${i}" style="width:0%"></div></div>
      <div class="manual-row">
        <span class="manual-lbl">➕ ידני:</span>
        <input type="number" class="manual-inp" min="0" max="700" step="10" placeholder="0" data-meal="${i}" data-mtype="veg" oninput="manualInput(this)">
        <span class="manual-lbl">גרם</span>
        <input type="text" class="manual-desc" placeholder="איזה ירק?" data-meal="${i}" data-mtype="veg-desc" oninput="S.meals[${i}].vegDesc=this.value;saveToStorage();">
      </div>
    </div>
    <input type="text" class="note-input" data-meal="${i}" placeholder="הערה חופשית..." oninput="S.meals[${i}].note=this.value;saveToStorage();">
  </div>`;
}

// ── TAP CHIP ─────────────────────────────────────────────────────────
function tap(el) {
  const m = +el.dataset.meal, type = el.dataset.type, name = el.dataset.name;
  const p = parseFloat(el.dataset.p||0), g = parseFloat(el.dataset.g||0);
  const xfat = el.dataset.xfat === '1';
  const meal = S.meals[m];

  if (type === 'carb') {
    // single-select
    document.querySelectorAll(`.chip[data-meal="${m}"][data-type="carb"]`).forEach(c=>c.classList.remove('sc'));
    if (meal.sc === name) { meal.sc=null; meal.carb=0; }
    else { el.classList.add('sc'); meal.sc=name; meal.carb=p; }

  } else if (type === 'prot') {
    if (el.classList.contains('sp')) {
      el.classList.remove('sp');
      meal.sp = meal.sp.filter(n=>n!==name);
      meal.prot = Math.max(0, meal.prot-p);
      if (xfat) meal.fat = Math.max(0, meal.fat-1);
    } else {
      el.classList.add('sp');
      meal.sp.push(name); meal.prot+=p;
      if (xfat) meal.fat+=1;
    }

  } else if (type === 'fat') {
    if (el.classList.contains('sf')) {
      el.classList.remove('sf');
      meal.sf = meal.sf.filter(n=>n!==name);
      meal.fat = Math.max(0, meal.fat-p);
    } else {
      el.classList.add('sf');
      meal.sf.push(name); meal.fat+=p;
    }

  } else if (type === 'veg') {
    if (el.classList.contains('sv')) {
      el.classList.remove('sv');
      meal.sv = meal.sv.filter(n=>n!==name);
      meal.veg = Math.max(0, meal.veg-g);
    } else {
      el.classList.add('sv');
      meal.sv.push(name); meal.veg+=g;
    }
  }

  refreshMeal(m);
  refreshBank();
}

function fmt(n){ return n%1===0?n:n.toFixed(1); }

// ── MANUAL INPUT ──────────────────────────────────────────────────────
function manualInput(el) {
  const m = +el.dataset.meal, type = el.dataset.mtype;
  const val = parseFloat(el.value) || 0;
  const meal = S.meals[m];
  if      (type==='carb') meal.mCarb = val;
  else if (type==='prot') meal.mProt = val;
  else if (type==='fat')  meal.mFat  = val;
  else if (type==='veg')  meal.mVeg  = val;
  refreshMeal(m);
  refreshBank();
}

function refreshMeal(i) {
  const m = S.meals[i];
  const tc = m.carb + (m.mCarb||0);
  const tp = m.prot + (m.mProt||0);
  const tf = m.fat  + (m.mFat||0);
  const tv = m.veg  + (m.mVeg||0);
  document.getElementById('mc-c'+i).textContent = fmt(tc)+' מנות';
  document.getElementById('mc-p'+i).textContent = fmt(tp)+' מנות';
  document.getElementById('mc-f'+i).textContent = fmt(tf)+' מנות';
  document.getElementById('mc-v'+i).textContent = tv+' גרם';
  document.getElementById('vf'+i).style.width = Math.min(100,(tv/700)*100)+'%';
  const any = tc||tp||tf||tv||m.time;
  document.getElementById('ms'+i).textContent = any?'✅':'⬜';
}

// ── BANK ─────────────────────────────────────────────────────────────
function refreshBank() {
  let C=0,P=0,F=0,V=0;
  for(let i=1;i<=5;i++){
    C+=S.meals[i].carb+(S.meals[i].mCarb||0);
    P+=S.meals[i].prot+(S.meals[i].mProt||0);
    F+=S.meals[i].fat +(S.meals[i].mFat||0);
    V+=S.meals[i].veg +(S.meals[i].mVeg||0);
  }
  document.getElementById('bvC').textContent=fmt(C);
  document.getElementById('bvP').textContent=fmt(P);
  document.getElementById('bvF').textContent=fmt(F);
  document.getElementById('bvV').textContent=V+'ג';
  styleBank('bkC','bvC',C,5,6);
  styleBank('bkP','bvP',P,3.5,3.5);
  styleBank('bkF','bvF',F,2,2);
  styleBank('bkV','bvV',V>=700?1:0,1,1);
  genAlerts(C,P,F,V);
  genFeedback(C,P,F,V);
  saveToStorage();
}

function styleBank(cid,vid,val,min,max){
  const c=document.getElementById(cid),v=document.getElementById(vid);
  c.classList.remove('warn','ok-state');
  if(val>max)c.classList.add('warn');
  else if(val>=min){c.classList.add('ok-state');c.classList.add('pulse');setTimeout(()=>c.classList.remove('pulse'),700);}
}

// ── TIMINGS ───────────────────────────────────────────────────────────
function updateTimings(){
  S.wakeup=document.getElementById('wakeupTime').value;
  const T={};
  document.querySelectorAll('.meal-time').forEach(inp=>{const m=+inp.dataset.meal;S.meals[m].time=inp.value;T[m]=inp.value;refreshMeal(m);});
  for(let i=1;i<=5;i++){
    const b=document.getElementById('tb'+i);
    if(!T[i]){b.textContent='—';b.className='time-badge';continue;}
    b.textContent=T[i];b.className='time-badge';
    if(i===1&&S.wakeup&&tgap(S.wakeup,T[1])>60){b.className='time-badge late';b.textContent=T[1]+' ⚠️';}
    else if(i>1){for(let j=i-1;j>=1;j--){if(T[j]){if(tgap(T[j],T[i])>240){b.className='time-badge late';b.textContent=T[i]+' ⚠️';}break;}}}
  }
  refreshBank();
}

function tgap(a,b){if(!a||!b)return 0;const[h1,m1]=a.split(':').map(Number),[h2,m2]=b.split(':').map(Number);return(h2*60+m2)-(h1*60+m1);}

// ── ALERTS ───────────────────────────────────────────────────────────
function genAlerts(C,P,F,V){
  const z=document.getElementById('alertsZone');z.innerHTML='';
  if(C>6)a(z,`⚠️ ${fmt(C)} מנות פחמימה — חרגת מהמקסימום (6).`,'warn');
  if(C>=5&&C<=6)a(z,`✅ ${fmt(C)} מנות פחמימה — בטווח!`,'good');
  if(P>3.5)a(z,`⚠️ ${fmt(P)} מנות חלבון — חרגת מהמקסימום (3.5).`,'warn');
  if(F>2)a(z,`⚠️ ${fmt(F)} מנות שומן — המגבלה היא 2.`,'warn');
  if(V>0&&V<700)a(z,`ℹ️ חסרים עוד ${700-V} גרם ירקות.`,'info');
  if(V>=700)a(z,`✅ הגעת ל-700 גרם ירקות!`,'good');
}
function a(z,msg,t){const e=document.createElement('div');e.className='alert '+t;e.textContent=msg;z.appendChild(e);}

// ── FEEDBACK ─────────────────────────────────────────────────────────
function genFeedback(C,P,F,V){
  const el=document.getElementById('feedbackText'),btn=document.getElementById('copyBtn');
  if(!C&&!P&&!V){el.textContent='מלאי ארוחות כדי לקבל דיווח...';el.style.fontStyle='italic';el.style.color='var(--text-muted)';btn.style.display='none';return;}
  const d=new Date().toLocaleDateString('he-IL',{day:'numeric',month:'numeric',year:'numeric'});
  let r=`דיווח תזונה ${d}\n`;
  if(S.wakeup)r+=`שעת השכמה: ${S.wakeup}\n`;
  r+='\n';
  const mn=['','ראשונה','שנייה','שלישית','רביעית','חמישית'];
  for(let i=1;i<=5;i++){
    const m=S.meals[i];
    if(!m.carb&&!m.prot&&!m.fat&&!m.veg&&!m.time)continue;
    let line=`ארוחה ${mn[i]}`;
    if(m.time)line+=` בשעה ${m.time}`;
    line+=': ';
    const parts=[];
    if(m.sc)parts.push(m.sc);
    if(m.sp&&m.sp.length)parts.push(m.sp.join(', '));
    if(m.sf&&m.sf.length)parts.push(m.sf.join(', '));
    if(m.sv&&m.sv.length)parts.push(m.sv.join(', ')+(m.veg?` (${m.veg}ג)`:''));
    if(m.mCarb)parts.push(`פחמימה ידנית: ${fmt(m.mCarb)} מנות${m.carbDesc?' ('+m.carbDesc+')':''}`);
    if(m.mProt)parts.push(`חלבון ידני: ${fmt(m.mProt)} מנות${m.protDesc?' ('+m.protDesc+')':''}`);
    if(m.mFat) parts.push(`שומן ידני: ${fmt(m.mFat)} מנות${m.fatDesc?' ('+m.fatDesc+')':''}`);
    if(m.mVeg) parts.push(`ירקות ידני: ${m.mVeg}ג${m.vegDesc?' ('+m.vegDesc+')':''}`);
    if(m.note)parts.push(m.note);
    r+=line+(parts.length?parts.join(' + '):'—')+'\n';
  }
  r+='\nסיכום:\n';
  r+=`פחמימות: ${fmt(C)}/5–6 ${C>=5&&C<=6?'✅':C>6?'⚠️ חריגה':'⚠️ חסרות'}\n`;
  r+=`חלבונים: ${fmt(P)}/3.5 ${P>=3.5?'✅':'⚠️ חסרות'}\n`;
  r+=`שומנים: ${fmt(F)}/2 ${F===2?'✅':F>2?'⚠️ חריגה':''}\n`;
  r+=`ירקות: ${V}/700ג ${V>=700?'✅':'⚠️ לא הושלמו'}\n`;
  el.textContent=r;el.style.fontStyle='normal';el.style.color='var(--text)';el.style.fontSize='0.76rem';
  btn.style.display='inline-block';
}

function copyReport(){
  navigator.clipboard.writeText(document.getElementById('feedbackText').textContent).then(()=>{
    const b=document.getElementById('copyBtn');b.textContent='✅ הועתק!';setTimeout(()=>b.textContent='📋 העתק לוואטסאפ',2000);
  });
}

// ── STORAGE ───────────────────────────────────────────────────────────
function tk(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;}

function saveToStorage(){
  try{localStorage.setItem('diet_'+tk(),JSON.stringify({wakeup:S.wakeup,meals:S.meals}));}catch(e){}
}

function loadFromStorage(){
  try{
    const raw=localStorage.getItem('diet_'+tk());
    if(!raw)return;
    const data=JSON.parse(raw);
    S.wakeup=data.wakeup||'07:00';
    document.getElementById('wakeupTime').value=S.wakeup;
    if(!data.meals)return;
    for(let i=1;i<=5;i++){
      const sv=data.meals[i];if(!sv)continue;
      Object.assign(S.meals[i],sv);
      const m=S.meals[i];
      const ti=document.querySelector(`.meal-time[data-meal="${i}"]`);
      if(ti&&m.time)ti.value=m.time;
      if(m.sc){const c=document.querySelector(`.chip[data-meal="${i}"][data-type="carb"][data-name="${CSS.escape(m.sc)}"]`);if(c)c.classList.add('sc');}
      (m.sp||[]).forEach(n=>{const c=document.querySelector(`.chip[data-meal="${i}"][data-type="prot"][data-name="${CSS.escape(n)}"]`);if(c)c.classList.add('sp');});
      (m.sf||[]).forEach(n=>{const c=document.querySelector(`.chip[data-meal="${i}"][data-type="fat"][data-name="${CSS.escape(n)}"]`);if(c)c.classList.add('sf');});
      (m.sv||[]).forEach(n=>{const c=document.querySelector(`.chip[data-meal="${i}"][data-type="veg"][data-name="${CSS.escape(n)}"]`);if(c)c.classList.add('sv');});
      const ni=document.querySelector(`.note-input[data-meal="${i}"]`);if(ni&&m.note)ni.value=m.note;
      // restore manual inputs
      ['carb','prot','fat','veg'].forEach(t=>{
        const mi=document.querySelector(`.manual-inp[data-meal="${i}"][data-mtype="${t}"]`);
        const key='m'+t[0].toUpperCase()+t.slice(1);
        if(mi&&m[key])mi.value=m[key];
        const descKey=t+'Desc';
        const di=document.querySelector(`.manual-desc[data-meal="${i}"][data-mtype="${t}-desc"]`);
        if(di&&m[descKey])di.value=m[descKey];
      });
      refreshMeal(i);
    }
  }catch(e){}
}

function saveToHistory(){
  let C=0,P=0,F=0,V=0;
  for(let i=1;i<=5;i++){C+=S.meals[i].carb;P+=S.meals[i].prot;F+=S.meals[i].fat;V+=S.meals[i].veg;}
  const raw=localStorage.getItem('diet_history')||'[]';
  let h=JSON.parse(raw);
  const key=tk();
  const entry={date:key,dateLabel:new Date().toLocaleDateString('he-IL',{weekday:'short',day:'numeric',month:'numeric'}),carb:C,prot:P,fat:F,veg:V};
  h=h.filter(x=>x.date!==key);h.unshift(entry);if(h.length>14)h=h.slice(0,14);
  localStorage.setItem('diet_history',JSON.stringify(h));
  alert('✅ נשמר בהיסטוריה!');renderHistory();
}

function renderHistory(){
  const list=document.getElementById('historyList');
  const h=JSON.parse(localStorage.getItem('diet_history')||'[]');
  if(!h.length){list.innerHTML='<div style="color:var(--text-muted);text-align:center;padding:40px 0;font-size:0.83rem;">אין היסטוריה עדיין.</div>';return;}
  list.innerHTML=h.map(x=>`<div class="history-item">
    <div class="history-date">${x.dateLabel}</div>
    <div class="history-row"><span>פחמימות</span><span class="history-value ${x.carb>=5&&x.carb<=6?'dok':x.carb>6?'dwarn':''}">${fmt(x.carb)} / 5–6 ${x.carb>=5&&x.carb<=6?'✅':x.carb>6?'⚠️':''}</span></div>
    <div class="history-row"><span>חלבונים</span><span class="history-value ${x.prot>=3.5?'dok':'dwarn'}">${fmt(x.prot)} / 3.5 ${x.prot>=3.5?'✅':'⚠️'}</span></div>
    <div class="history-row"><span>שומנים</span><span class="history-value">${fmt(x.fat)} / 2 ${x.fat===2?'✅':''}</span></div>
    <div class="history-row"><span>ירקות</span><span class="history-value ${x.veg>=700?'dok':'dwarn'}">${x.veg}ג / 700ג ${x.veg>=700?'✅':'⚠️'}</span></div>
  </div>`).join('');
}

function clearToday(){if(!confirm('למחוק?'))return;localStorage.removeItem('diet_'+tk());location.reload();}

function showView(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn,.bottom-btn').forEach(e=>e.classList.remove('active'));
  const cap=v[0].toUpperCase()+v.slice(1);
  document.getElementById('view'+cap).classList.add('active');
  document.getElementById('nav'+cap).classList.add('active');
  document.getElementById('btn'+cap).classList.add('active');
  if(v==='history')renderHistory();
}

// ── INIT ─────────────────────────────────────────────────────────────
function init(){
  document.getElementById('headerDate').textContent=new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
  buildMeals();
  loadFromStorage();
  updateTimings();
  refreshBank();
}
init();
</script>
